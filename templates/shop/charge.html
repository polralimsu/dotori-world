{% extends 'base.html' %}
{% load i18n %}

{% block extra_head %}<script src="https://js.tosspayments.com/v2/standard"></script>{% endblock %}
{% block title %}{% trans "Charge Dotori" %} - DOTORi World{% endblock %}

{% block content %}
<div class="aws-card" style="max-width: 500px; margin: 20px auto;">
    <div class="aws-card-header">
        <h2>🌰 {% trans "Charge Dotori" %}</h2>
    </div>
    <div class="aws-card-body">
        <p style="margin-bottom: 16px;">{% trans "Virtual payment system for Dotori." %}</p>
        <div class="form-group">
            <label for="amount">{% trans "Amount (Dotori)" %}</label>
            <select name="amount" id="amount" class="form-control">
                <option value="10">10 🌰 {% trans "Dotori" %} (1,000 KRW)</option>
                <option value="50">50 🌰 {% trans "Dotori" %} (5,000 KRW)</option>
                <option value="100">100 🌰 {% trans "Dotori" %} (10,000 KRW)</option>
            </select>
        </div>

        <button class="btn btn-primary" style="width: 100%; margin-top: 10px;" onclick="requestPayment()">{% trans "Pay" %}</button>
        <script>
            // ------  SDK 초기화 ------
            // @docs https://docs.tosspayments.com/sdk/v2/js#토스페이먼츠-초기화
            const clientKey = "{{ toss_client_key }}";
            const customerKey = "{{ user.uuid }}";
            const tossPayments = TossPayments(clientKey);
            // 회원 결제
            // @docs https://docs.tosspayments.com/sdk/v2/js#tosspaymentspayment
            const payment = tossPayments.payment({ customerKey });
            // 비회원 결제
            // const payment = tossPayments.payment({customerKey: TossPayments.ANONYMOUS})
            // ------ '결제하기' 버튼 누르면 결제창 띄우기 ------
            // @docs https://docs.tosspayments.com/sdk/v2/js#paymentrequestpayment

            async function requestPayment() {
                // 결제를 요청하기 전에 orderId, amount를 서버에 저장하세요.
                // 결제 과정에서 악의적으로 결제 금액이 바뀌는 것을 확인하는 용도입니다.
                const sel = document.getElementById('amount');
                const val = sel.value;
                
                const url = `{% url 'shop:get_pay_id' %}?amount=${encodeURIComponent(val)}`;
                const resp = await fetch(url);
                const id = await resp.text();
                
                await payment.requestPayment({
                    method: "CARD", // 카드 결제
                    amount: {
                        currency: "KRW",
                        value: val * 100,
                    },
                    orderId: id, // 고유 주문번호
                    orderName: "도토리 " + val + "개",
                    successUrl: window.location.origin + "{% url 'shop:pay_success' %}", // 결제 요청이 성공하면 리다이렉트되는 URL
                    failUrl: window.location.origin + "{% url 'shop:pay_failure' %}", // 결제 요청이 실패하면 리다이렉트되는 URL
                    card: {
                        useEscrow: false,
                        flowMode: "DEFAULT", // 통합결제창 여는 옵션
                        useCardPoint: false,
                        useAppCardOnly: false,
                    },
                });
            }
        </script>
    </div>
</div>
{% endblock %}
