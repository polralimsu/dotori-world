{% load i18n static %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DOTORi World{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/index.css' %}?v=8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">
    <script>
        if (window.self !== window.top) {
            window.parent.location.href = window.location.href;
        }
    </script>
    {% block extra_head %}{% endblock %}
</head>

<body>
    <div class="cy-auth-container">
        <div class="simple-layout-header" style="display: block;">
            <a href="/">
                <span>🐿️</span>
                <span style="font-family: 'Share Tech Mono', monospace; letter-spacing: -0.5px;">DOTORi World</span>
            </a>
        </div>

        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        {% block content %}
        {% endblock %}

        <!-- Language selector -->
        <div style="text-align: center; margin-top: 20px;">
            <form action="{% url 'set_language' %}" method="post" style="display: inline-block; margin: 0;">
                {% csrf_token %}
                <input name="next" type="hidden" value="{{ request.get_full_path }}">
                <select name="language" onchange="this.form.submit()" class="lang-select">
                    {% get_current_language as LANGUAGE_CODE %}
                    {% get_available_languages as LANGUAGES %}
                    {% for lang in LANGUAGES %}
                    {% get_language_info for lang.0 as info %}
                    <option value="{{ lang.0 }}" {% if lang.0 == LANGUAGE_CODE %}selected{% endif %}>
                        {{ info.name_local }}
                    </option>
                    {% endfor %}
                </select>
            </form>
        </div>
    </div>
    {% block extra_js %}{% endblock %}
</body>
</html>
